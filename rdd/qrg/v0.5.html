<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator with Logo</title>
  <script src="https://unpkg.com/qr-code-styling@1.9.2/lib/qr-code-styling.js"></script>
  <style>
    body { 
      font-family: Arial, sans-serif; 
      text-align: center; 
      padding: 40px; 
      background: #f8f9fa; 
    }
    input, button { 
      padding: 12px; 
      margin: 10px; 
      font-size: 16px; 
    }
    .buttons {
      margin-top: 30px;
    }
    h1 { margin-bottom: 30px; }
  </style>
</head>
<body>
  <h1>QR Code Generator with Logo (Downloads Only)</h1>
  
  <input type="text" id="text" placeholder="Enter URL or text" value="https://example.com" style="width: 500px;">
  <br>
  <input type="file" id="logoUpload" accept="image/*">
  <br><br>
  
  <button onclick="generateQR()">Generate</button>

  <div class="buttons" id="downloadSection" style="display: none;">
    <button onclick="downloadQRpng()">Download PNG (High Resolution)</button>
    <button onclick="downloadQRsvg()">Download SVG (Scalable Vector)</button>
  </div>

  <div id="container" style="display: none;"></div>

  <script>
    let qrCode = null;
    let currentLogoUrl = null;

    async function generateQR() {
      const text = document.getElementById("text").value.trim();
      if (!text) {
        alert("Please enter some text or URL");
        return;
      }

      // Clear previous QR (just in case)
      document.getElementById("container").innerHTML = "";

      const options = {
        width: 1500,          // Higher resolution = sharper result
        height: 1500,
        type: "svg",          // Best for quality & scaling
        data: text,
        errorCorrectionLevel: "H",
        margin: 20,

        dotsOptions: {
          color: "#000000",
          type: "square"
        },

        backgroundOptions: {
          color: "#ffffff"
        },

        imageOptions: {
          crossOrigin: "anonymous",
          margin: 20,
          imageSize: 0.28,
          hideBackgroundDots: true
        }
      };

      if (currentLogoUrl) {
        options.image = currentLogoUrl;
      }

      qrCode = new QRCodeStyling(options);

      // We don't append it to the page → invisible generation
      // But we still need to call .append() once so the library renders internally
      qrCode.append(document.getElementById("container"));

      // Show download buttons
      document.getElementById("downloadSection").style.display = "block";
    }

    // Logo upload handler
    document.getElementById("logoUpload").addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
          currentLogoUrl = ev.target.result;
          generateQR(); // Auto-regenerate when logo is added
        };
        reader.readAsDataURL(file);
      }
    });

    function downloadQRpng() {
      if (qrCode) {
        qrCode.download({ 
          name: "qr-with-logo", 
          extension: "png" 
        });
      }
    }

    function downloadQRsvg() {
      if (qrCode) {
        qrCode.download({ 
          name: "qr-with-logo", 
          extension: "svg" 
        });
      }
    }

    // Optional: Generate on load with default value
    window.onload = () => generateQR();
  </script>
</body>
</html>
