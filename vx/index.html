<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The WISPNET's VX project is an open-source citizen-science weather research station.">
  <title>WISPNET – VX Project</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      scroll-behavior: smooth;
      font-family: Arial, sans-serif;
      color: #000000;
      height: 100%;
    }

    #main {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    #arrows {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: absolute;
      bottom: 20%;
      left: 50%;
      transform: translateX(-50%);
      filter: invert(1);
    }

    h1 {
      font-size: 3em;
      color: white;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 1em;
      color: white;
      margin-top: 0;
    }

    /* New background section */
    #backgroundSection {
      position: relative;
      width: 100%;
      height: 100vh; /* Full viewport height */
      background-color: #111;
      overflow: hidden;
      background-image: url('./wave.svg');
      background-repeat: repeat-x;
      background-position: center;
    }

    #topoSVG {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
    }

    /* Updated Sidebar Styling */
    #sidebar {
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-color: rgba(244, 244, 244, 1);
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease-in-out;
      z-index: 10;
    }

    #sidebar.visible {
      opacity: 1;
      pointer-events: auto;
    }

    #sidebar a {
      padding: 15px 20px;
      text-decoration: none;
      font-size: 2.5em;
      color: #000;
      display: block;
      position: relative;
      transition: color 0.5s;
      text-align: center;
    }

    #sidebar a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0;
      height: 2px;
      background-color: #000;
      transition: width 0.5s ease;
    }

    #sidebar a:hover::after {
      width: 100%;
    }

    #sidebar a:hover {
      text-decoration: none;
    }

    #menuToggle {
      font-size: 2em;
      color: #fff;
      cursor: pointer;
      position: fixed;
      top: 15px;
      left: 20px;
      z-index: 11;
    }

  </style>
</head>
<body>
    <div id="menuToggle" role="button" tabindex="0" aria-label="Toggle Menu">☰</div>
    <div id="sidebar">
      <a href="#main" onclick="showSection('main', event)">Home</a>
      <a href="https://wisp.wispnet.org">Main</a>
      <a href="https://wisp.wispnet.org/contact">Contact</a>
      <a href="https://wisp.wispnet.org/IOserver">IOserver</a>
      <a href="https://wisp.wispnet.org/TDP">TDP</a>
      <a href="https://wisp.wispnet.org/TDP/Beta">Beta</a>
      <a href="https://wisp.wispnet.org/resources">Resources</a>
      <a href="https://wisp.wispnet.org/depr">Depreciated</a>
    </div>

    <!-- Existing main section -->
    <section id="main" class="active">
      <h1>The VX Project</h1>
      <h2>The open-source weather research station.</h2>
      <div id="arrows">
        <img src="../resources/svgl/fadetest.svg" class="arrow" width="50">
        <img src="../resources/svgl/fadetest.svg" class="arrow" width="50">
        <img src="../resources/svgl/fadetest.svg" class="arrow" width="50">
      </div>
    </section>

    <!-- New background section -->
    <section id="backgroundSection">

    </section>

    <script>
      function fadeInArrows() {
        const arrows = document.querySelectorAll('.arrow');
        arrows.forEach((arrow, index) => {
          setTimeout(() => {
            arrow.style.opacity = 1;
          }, index * 1000);
        });
      }
      
      window.onload = fadeInArrows;
    </script>

    <script src="sidebar.js"> </script>
    <script src="eclipseflow.js"></script>
</body>
</html>
